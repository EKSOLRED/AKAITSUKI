<!DOCTYPE html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKAITSUKI — Библиотека аниме</title>
    <meta
      name="description"
      content="Современная библиотека аниме команды озвучки AKAITSUKI с каталогом, избранным и локальной авторизацией."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar glass">
        <a class="brand" href="#/">
          <span class="brand__badge">赤</span>
          <div>
            <strong>AKAITSUKI</strong>
            <span>Anime Voice Library</span>
          </div>
        </a>

        <nav class="nav" id="mainNav">
          <a href="#/">Главная</a>
          <a href="#/catalog">Каталог</a>
          <a href="#/favorites">Избранное</a>
          <a href="#/about">О нас</a>
        </nav>

        <div class="topbar__actions">
          <button class="theme-toggle-button" id="themeToggle" aria-label="Переключить тему" data-tooltip="Переключить тему">
            <span class="theme-toggle-button__icon" id="themeToggleIcon" aria-hidden="true">☾</span>
          </button>
          <a class="admin-wrench" href="#/admin" data-admin-link hidden aria-label="Админка" data-tooltip="Админка">
            <span class="admin-wrench__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10.2 3.5h3.6l.56 2.24c.42.12.82.28 1.2.5l1.98-1.12 2.55 2.54-1.12 1.98c.22.38.38.78.5 1.2l2.23.56v3.6l-2.24.56c-.12.42-.28.82-.5 1.2l1.12 1.98-2.54 2.55-1.98-1.12c-.38.22-.78.38-1.2.5l-.56 2.23h-3.6l-.56-2.24a6.4 6.4 0 0 1-1.2-.5l-1.98 1.12-2.55-2.54 1.12-1.98a6.4 6.4 0 0 1-.5-1.2L2.5 13.8v-3.6l2.24-.56c.12-.42.28-.82.5-1.2L4.12 6.46 6.66 3.9l1.98 1.12c.38-.22.78-.38 1.2-.5L10.2 3.5Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.7"/>
              </svg>
            </span>
          </a>
          <div class="user-box" id="userBox"></div>
        </div>
      </header>

            <main id="app"></main>
      <footer class="site-footer glass" id="siteFooter"></footer>
    </div>

    <div class="modal hidden" id="authModal" aria-hidden="true">
      <div class="modal__overlay" data-close-modal></div>
      <div class="modal__card glass">
        <button class="modal__close" data-close-modal aria-label="Закрыть">×</button>
        <div class="modal__tabs">
          <button class="tab-button active" data-auth-tab="login">Вход</button>
          <button class="tab-button" data-auth-tab="register">Регистрация</button>
        </div>
        <div id="authContent"></div>
      </div>
    </div>

    <template id="animeCardTemplate">
      <article class="anime-card glass">
        <div class="anime-card__poster-wrap">
          <img class="anime-card__poster" alt="Постер аниме" />
          <span class="anime-card__status"></span>
        </div>
        <div class="anime-card__content">
          <div class="anime-card__meta-row">
            <span class="anime-card__year"></span>
            <span class="anime-card__episodes"></span>
          </div>
          <h3 class="anime-card__title"></h3>
          <p class="anime-card__description"></p>
          <div class="chips anime-card__genres"></div>
          <div class="anime-card__actions">
            <button class="button button--ghost" data-action="details">Смотреть</button>
            <button class="favorite-button" type="button" data-action="favorite" aria-label="Добавить в избранное" data-tooltip="Добавить в избранное"><span class="favorite-button__label">В избранное</span></button>
          </div>
        </div>
      </article>
    </template>

    <button class="scroll-fab" id="scrollFab" type="button" aria-label="Прокрутить страницу вниз">↓</button>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
